name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']

    steps:
      - uses: actions/checkout@v4
      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Display version
        run: go version
      - name: Install dependencies
        run: go install github.com/e-kucheriavyi/gossrng/cmd/gossrng@latest
      - name: Build
        run: gossrng -m export -r ./
      - name: show
        run: ls -lha
      - name: setup ssh
        run: |
          mkdir -p .ssh
          echo "${{ secrects.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/idrsa
      - name: deploy
        run: scp -i ~/.ssh/id_rsa -r ./dist/* ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/kucheriavyi
